    const app = document.getElementById("app");
    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function renderInline(value){
      return escapeHtml(value)
        .replace(/\[red-bold\]([\s\S]*?)\[\/red-bold\]/g, '<strong class="md-red-bold">$1</strong>')
        .replace(/\[red\]([\s\S]*?)\[\/red\]/g, '<span class="md-red">$1</span>')
        .replace(/\*\*([\s\S]*?)\*\*/g, '<strong class="md-bold">$1</strong>');
    }

    function parseMarkdown(markdown){
      const lines = markdown.split(/\n/).map(line => line.trim()).filter(Boolean);

      const data = {
        title: "",
        subtitle: "",
        tagline: "",
        time: "",
        contentLines: [],
        warning: "",
        tables: [],
        applyText: "",
        serviceText: "",
        rules: [],
        awardTables: [
          { title: "八強競猜獎金名單", rows: [] },
          { title: "四強競猜獎金名單", rows: [] },
          { title: "冠軍競猜獎金名單", rows: [] }
        ]
      };

      let tableTitle = "";
      let currentTable = null;
      let isRulesArea = false;
      let isAwardArea = false;

      function closeTable(){
        if(currentTable && currentTable.rows.length){
          data.tables.push(currentTable);
        }
        currentTable = null;
      }

      for(const line of lines){
        if(!line.startsWith("|")) closeTable();

        if(line.startsWith("# ")){
          data.title = line.replace("# ","").trim();
          continue;
        }

        if(line.startsWith("## ")){
          data.subtitle = line.replace("## ","").trim();
          continue;
        }

        if(line.startsWith("### ")){
          data.tagline = line.replace("### ","").trim();
          continue;
        }

        if(line.startsWith("#### ")){
          tableTitle = line.replace("#### ","").trim();
          continue;
        }

        if(line.startsWith("活動時間:") || line.startsWith("開放預測日期:")){
          data.time = line;
          continue;
        }

        if(line.startsWith("活動內容:")){
          data.contentLines.push(line.replace("活動內容:","").trim());
          continue;
        }

        if(line.startsWith("申請方式:")){
          data.applyText = line.replace("申請方式:","").trim();
          continue;
        }

        if(line.startsWith("LINE客服申請")){
          data.serviceText = line;
          continue;
        }

        if(line === "活動規則"){
          isRulesArea = true;
          continue;
        }

        if(line === "競猜預測成功 獲獎名單"){
          isAwardArea = true;
          continue;
        }

        if(isAwardArea) continue;

        if(line.startsWith("|")){
          if(!currentTable){
            currentTable = { title: tableTitle, rows: [] };
            tableTitle = "";
          }
          if(!line.includes("---")){
            currentTable.rows.push(line.split("|").slice(1,-1).map(cell => cell.trim()));
          }
          continue;
        }

        if(/^\d+\./.test(line)){
          data.rules.push(line);
          continue;
        }

        data.contentLines.push(line);
      }

      closeTable();
      data.table = data.tables[0]?.rows || [];
      data.content = data.contentLines.join("\n");
      return data;
    }

    function renderTable(rows){
      if(!rows.length) return "";
      const [head, ...body] = rows;
      return `
        <div class="promo-table">
          <table>
            <thead>
              <tr>${head.map(cell => `<th>${escapeHtml(cell)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${body.map(row => `
                <tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderTables(tables){
      return tables.map(item => `
        <div style="margin-top:18px">
          ${item.title ? `<h3 style="margin:0 0 10px;color:#2a4568;font-size:20px;font-weight:950">${escapeHtml(item.title)}</h3>` : ""}
          ${renderTable(item.rows)}
        </div>
      `).join("");
    }

    function renderPage(){
      const data = parseMarkdown(defaultMarkdown);

      app.innerHTML = `
        <section class="hero">
          <div class="hero-content">
            <div class="hero-pill">FM富馬｜世界盃期間限定</div>
            <h1>${escapeHtml(data.title)}</h1>
            <h2>${escapeHtml(data.subtitle)}</h2>
            <h3>${escapeHtml(data.tagline)}</h3>
            <div class="time-card">📅 ${escapeHtml(data.time)}</div>
          </div>
          <aside class="cta-panel">
            <h2>申請方式</h2>
            <p>${escapeHtml(data.applyText)}</p>
            <a class="btn" href="https://line.me/ti/p/~@636dcdpl" target="_blank">${escapeHtml(data.serviceText || "LINE客服申請")}　→</a>
          </aside>
        </section>

        <section class="grid-2">
          <article class="card">
            <h2>活動內容</h2>
            <p>${renderInline(data.content).replaceAll("\n", "<br>")}</p>
          </article>

          <!--<article class="card warning">
            <h2>重要申請門檻</h2>
            <p>${escapeHtml(data.warning)}</p>
          </article>-->
        </section>

        <section class="section">
          <div class="section-head">
            <div>
              <h2>競猜預測活動資料</h2>
              <p></p>
            </div>
          </div>
          ${renderTables(data.tables)}
        </section>

        <section class="section rules-wrap">
          <div>
            <div class="section-head">
              <div>
                <h2>活動規則</h2>
                <p></p>
              </div>
            </div>

            <div class="rules">
              ${data.rules.map((rule, index) => {
                const cleanRule = rule.replace(/^\d+\./, "");
                return `
                  <div class="rule">
                    <span class="num">${index + 1}</span>
                    <span>${renderInline(cleanRule)}</span>
                  </div>
                `;
              }).join("")}
            </div>
          </div>

          
        </section>

        <section class="section">
          <div class="section-head">
            <div>
              <h2>競猜預測成功 獲獎名單</h2>
            </div>
          </div>
          <div style="margin-bottom:8px;color:#455a75;font-size:15px;line-height:2">
            <div>申請方式：告知客服申請 競猜名單彩金</div>
            <div><a href="https://line.me/ti/p/~@636dcdpl" target="_blank" style="display:inline-flex;align-items:center;padding:8px 18px;border-radius:8px;background:#07b53b;color:#fff;font-weight:900;text-decoration:none">LINE客服申請</a></div>
            <div style="color:#e00000;font-weight:700">於名單內之會員，請於7/31 23:59前向LINE客服領取，逾期視同放棄。</div>
          </div>
          ${data.awardTables.map(t => `
            <div style="margin-top:24px">
              <h3 style="margin:0 0 10px;color:#2a4568;font-size:20px;font-weight:950">${escapeHtml(t.title)}</h3>
              <div class="promo-table">
                <table>
                  <thead>
                    <tr><th>會員帳號</th><th>預測隊伍</th><th>成功預測組數</th><th>贈送彩金</th></tr>
                  </thead>
                  <tbody>
                    ${t.rows.length
                      ? t.rows.map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")
                      : `<tr><td colspan="4" style="text-align:center;color:#64748b;padding:28px 0">敬請期待</td></tr>`
                    }
                  </tbody>
                </table>
              </div>
            </div>
          `).join("")}
        </section>
      `;
    }
    renderPage();

    const mobileMenu = document.getElementById("mobileMenu");
    const mobileMenuToggle = document.getElementById("mobileMenuToggle");
    const mobileMenuPanel = document.getElementById("mobileMenuPanel");
    const mobileMenuBackdrop = document.getElementById("mobileMenuBackdrop");

    function setMobileMenuOpen(isOpen){
      if(!mobileMenu || !mobileMenuToggle || !mobileMenuPanel) return;
      mobileMenu.classList.toggle("is-open", isOpen);
      mobileMenuToggle.setAttribute("aria-expanded", String(isOpen));
      mobileMenuToggle.setAttribute("aria-label", isOpen ? "關閉選單" : "開啟選單");
      document.body.classList.toggle("mobilemenu-open", isOpen);
    }

    if(mobileMenuToggle && mobileMenuPanel){
      mobileMenuToggle.addEventListener("click", ()=>{
        setMobileMenuOpen(!mobileMenu.classList.contains("is-open"));
      });
      mobileMenuPanel.querySelectorAll("a").forEach(link=>{
        link.addEventListener("click", ()=>{ setMobileMenuOpen(false); });
      });
    }

    if(mobileMenuBackdrop){
      mobileMenuBackdrop.addEventListener("click", ()=>{ setMobileMenuOpen(false); });
    }

    document.addEventListener("keydown", event=>{
      if(event.key === "Escape") setMobileMenuOpen(false);
    });

    window.addEventListener("resize", ()=>{
      if(window.innerWidth > 900) setMobileMenuOpen(false);
    });

    const topPageBtn = document.querySelector(".toppage");
    if(topPageBtn){
      topPageBtn.addEventListener("click", event=>{
        event.preventDefault();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }
  </script>

</body>
</html>
