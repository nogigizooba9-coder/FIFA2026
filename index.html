<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熱門賽事輪播</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f5f7fa;padding:2rem}
.section{max-width:1200px;margin:0 auto;padding:2rem;background:linear-gradient(160deg,#e8f0fa 0%,#f0f4fb 60%,#e4ecf8 100%);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.header{text-align:center;margin-bottom:1.5rem}
.header h1{font-size:28px;font-weight:600;color:#3a5a9a;letter-spacing:.05em;margin-bottom:0.5rem}
.header p{font-size:14px;color:#7a96c4}
.tabs-wrap{display:flex;justify-content:center;margin:1.5rem 0 2rem}
.tabs{display:flex;gap:6px;background:rgba(255,255,255,0.7);border-radius:40px;padding:6px;border:0.5px solid rgba(150,180,230,0.3);box-shadow:0 2px 8px rgba(100,140,200,0.1)}
.tab{padding:8px 20px;border-radius:30px;font-size:14px;color:#6a88b8;cursor:pointer;border:none;background:transparent;transition:all .25s;white-space:nowrap;font-weight:500}
.tab:hover{color:#4a6898}
.tab.active{background:#fff;color:#3a5a9a;box-shadow:0 2px 6px rgba(80,120,200,0.2)}
.carousel-wrap{position:relative;padding:0 3rem}
.carousel-viewport{overflow:hidden;border-radius:12px}
.carousel-track{display:flex;gap:18px;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.match-card{flex-shrink:0;background:rgba(255,255,255,0.9);border:0.5px solid rgba(150,185,235,0.4);border-radius:14px;padding:1.5rem 1.25rem;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;box-shadow:0 2px 10px rgba(100,140,200,0.1);transition:transform .2s,box-shadow .2s}
.match-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(100,140,200,0.15)}
.card-league{font-size:13px;color:#7a96c4;font-weight:600}
.card-date{font-size:12px;color:#a0b4d0}
.card-matchup{display:flex;align-items:center;gap:14px;margin:8px 0}
.flag{font-size:36px;line-height:1}
.vs-text{font-size:14px;color:#aec0d8;font-weight:600;padding:0 6px}
.team-name{font-size:13px;color:#5a78a8;margin-top:4px;font-weight:500}
.team-block{display:flex;flex-direction:column;align-items:center;gap:4px}
.arrow-btn{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.95);border:0.5px solid rgba(150,185,235,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#5a78b8;font-size:18px;z-index:10;transition:all .25s;box-shadow:0 2px 8px rgba(100,140,200,0.15)}
.arrow-btn:hover:not(:disabled){background:#fff;box-shadow:0 4px 12px rgba(80,130,200,0.25);transform:translateY(-50%) scale(1.05)}
.arrow-btn:disabled{opacity:0.25;cursor:not-allowed}
.arrow-left{left:4px}
.arrow-right{right:4px}
.group-label{font-size:11px;font-weight:600;color:#8aabce;background:rgba(140,170,220,0.18);border-radius:12px;padding:3px 10px;margin-bottom:6px}
.multi-match{display:flex;flex-direction:column;gap:8px;width:100%}
.mini-match{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 0;border-top:0.5px solid rgba(150,185,235,0.25)}
.mini-match:first-child{border-top:none}
.mini-flag{font-size:22px;line-height:1}
.mini-vs{font-size:11px;color:#aec0d8;font-weight:600}
.mini-team{font-size:12px;color:#5a78a8;min-width:42px;font-weight:500}
.mini-team.left{text-align:right}
.mini-team.right{text-align:left}
.dots{display:flex;justify-content:center;gap:8px;margin-top:1.5rem}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(140,170,220,0.4);transition:all .3s;cursor:pointer}
.dot:hover{background:rgba(140,170,220,0.6)}
.dot.active{background:#7a9fd4;width:20px;border-radius:4px}
</style>
</head>
<body>

<div class="section">
  <div class="header">
    <h1>熱門賽事</h1>
    <p>嚴選頂級賽事 &nbsp;每天暢想不斷</p>
  </div>

  <div class="tabs-wrap">
    <div class="tabs" id="tabsEl"></div>
  </div>

  <div class="carousel-wrap" id="carouselWrap">
    <button class="arrow-btn arrow-left" id="btnLeft" aria-label="向左" disabled><i class="ti ti-chevron-left"></i></button>
    <div class="carousel-viewport" id="viewport">
      <div class="carousel-track" id="track"></div>
    </div>
    <button class="arrow-btn arrow-right" id="btnRight" aria-label="向右"><i class="ti ti-chevron-right"></i></button>
  </div>
  <div class="dots" id="dots"></div>
</div>

<script src="./json/rounds-data.js"></script>
<script>
const CARD_WIDTHS = {"1":240,"2":260,"3":300,"4":340,"6":420};
const rounds = Array.isArray(window.ROUNDS_DATA) ? window.ROUNDS_DATA : [];
let currentTab = 0;
let currentIndex = 0;
let cardW = 240;
const GAP = 18;

const track = document.getElementById("track");
const viewport = document.getElementById("viewport");
const btnLeft = document.getElementById("btnLeft");
const btnRight = document.getElementById("btnRight");
const dotsEl = document.getElementById("dots");
const tabsEl = document.getElementById("tabsEl");

function renderTabs(){
  tabsEl.innerHTML = "";
  rounds.forEach((round, index)=>{
    const btn = document.createElement("button");
    btn.className = "tab" + (index === currentTab ? " active" : "");
    btn.dataset.tab = String(index);
    btn.type = "button";
    btn.textContent = round.label;
    tabsEl.appendChild(btn);
  });
}

function setActiveTab(tabIdx){
  currentTab = tabIdx;
  tabsEl.querySelectorAll(".tab").forEach((btn, index)=>{
    btn.classList.toggle("active", index === tabIdx);
  });
}

function showStatus(message){
  track.innerHTML = `<div class="match-card" style="width:100%;min-height:220px">${message}</div>`;
  track.style.transform = "translateX(0)";
  dotsEl.innerHTML = "";
  btnLeft.disabled = true;
  btnRight.disabled = true;
}

function makeCard(card){
  const d = document.createElement("div");
  const w = CARD_WIDTHS[card.type] || 280;
  d.className = "match-card";
  d.style.width = w + "px";

  let html = `<div class="card-league">${card.league}</div><div class="card-date">${card.date}</div>`;

  if(card.type === "1"){
    const g = card.groups[0];
    const m = g.matches[0];
    html += `<div class="card-matchup">
      <div class="team-block"><div class="flag">${m[0]}</div><div class="team-name">${m[1]}</div></div>
      <div class="vs-text">VS</div>
      <div class="team-block"><div class="flag">${m[2]}</div><div class="team-name">${m[3]}</div></div>
    </div>`;
  } else if(card.type === "2"){
    html += `<div class="multi-match" style="margin-top:8px">`;
    card.groups.forEach(g=>{
      html += `<div class="group-label">${g.name}</div>`;
      g.matches.forEach(m=>{
        html += `<div class="mini-match">
          <span class="mini-team left">${m[1]}</span>
          <span class="mini-flag">${m[0]}</span>
          <span class="mini-vs">vs</span>
          <span class="mini-flag">${m[2]}</span>
          <span class="mini-team right">${m[3]}</span>
        </div>`;
      });
    });
    html += `</div>`;
  } else {
    html += `<div class="multi-match" style="margin-top:6px">`;
    card.groups.forEach(g=>{
      html += `<div style="display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap;justify-content:center">
        <div class="group-label">${g.name}</div>`;
      g.matches.forEach(m=>{
        html += `<div class="mini-match" style="width:100%">
          <span class="mini-team left" style="font-size:11px">${m[1]}</span>
          <span class="mini-flag" style="font-size:18px">${m[0]}</span>
          <span class="mini-vs">vs</span>
          <span class="mini-flag" style="font-size:18px">${m[2]}</span>
          <span class="mini-team right" style="font-size:11px">${m[3]}</span>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }

  d.innerHTML = html;
  return d;
}

function renderTab(tabIdx){
  const round = rounds[tabIdx];
  if(!round){
    showStatus("目前沒有賽事資料");
    return;
  }

  currentIndex = 0;
  track.innerHTML = "";
  round.cards.forEach(card=>{
    track.appendChild(makeCard(card));
  });

  const firstCard = round.cards[0];
  cardW = firstCard ? (CARD_WIDTHS[firstCard.type] || 280) : 280;
  renderDots(round.cards.length);
  updateCarousel();
}

function renderDots(n){
  dotsEl.innerHTML = "";
  for(let i = 0; i < n; i++){
    const d = document.createElement("div");
    d.className = "dot" + (i === 0 ? " active" : "");
    d.onclick = ()=>{
      currentIndex = i;
      updateCarousel();
    };
    dotsEl.appendChild(d);
  }
}

function updateCarousel(){
  const vpW = viewport.offsetWidth || 650;
  const cards = track.children;
  const n = cards.length;

  if(!n){
    btnLeft.disabled = true;
    btnRight.disabled = true;
    return;
  }

  const visibleCount = Math.max(1, Math.floor((vpW + GAP) / (cardW + GAP)));
  const maxIndex = Math.max(0, n - visibleCount);
  currentIndex = Math.max(0, Math.min(currentIndex, maxIndex));
  track.style.transform = `translateX(-${currentIndex * (cardW + GAP)}px)`;
  btnLeft.disabled = currentIndex === 0;
  btnRight.disabled = currentIndex >= maxIndex;
  dotsEl.querySelectorAll(".dot").forEach((d, i)=>{
    d.classList.toggle("active", i === currentIndex);
  });
}

function initRounds(){
  if(!rounds.length){
    tabsEl.innerHTML = "";
    showStatus("賽事資料未載入，請確認 json/rounds-data.js 是否存在。");
    return;
  }

  renderTabs();
  setActiveTab(0);
  renderTab(0);
}

btnLeft.onclick = ()=>{
  currentIndex--;
  updateCarousel();
};

btnRight.onclick = ()=>{
  currentIndex++;
  updateCarousel();
};

tabsEl.addEventListener("click", event=>{
  const btn = event.target.closest(".tab");
  if(!btn){
    return;
  }

  const tabIdx = Number(btn.dataset.tab);
  if(Number.isNaN(tabIdx) || tabIdx === currentTab){
    return;
  }

  setActiveTab(tabIdx);
  renderTab(tabIdx);
});

let touchStartX = 0;
viewport.addEventListener("touchstart", e=>{
  touchStartX = e.touches[0].clientX;
}, {passive:true});

viewport.addEventListener("touchend", e=>{
  const dx = touchStartX - e.changedTouches[0].clientX;
  if(Math.abs(dx) > 50){
    dx > 0 ? currentIndex++ : currentIndex--;
    updateCarousel();
  }
});

initRounds();
window.addEventListener("resize", updateCarousel);
</script>

</body>
</html>
